name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      # dist/ is committed and loaded directly by git-dependency consumers (c),
      # so fail the build if the committed bundle is stale vs a fresh compile.
      - name: Verify committed dist is up to date
        run: |
          npm run compile
          git diff --exit-code dist
