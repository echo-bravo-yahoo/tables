name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write   # OIDC trusted publishing + automatic provenance
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      # Trusted publishing requires npm >= 11.5.1; the runner's bundled npm may lag.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run test:coverage
      # OIDC trusted publishing authenticates via the id-token (no NODE_AUTH_TOKEN);
      # provenance is generated automatically from the public repo. prepublishOnly
      # (compile) runs first, so the tarball ships a fresh bundle.
      - run: npm publish
